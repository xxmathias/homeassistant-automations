alias: Entrance on Motion
description: Motion-activated entrance lighting with adaptive brightness and color
triggers:
  - entity_id: binary_sensor.bewegungssensor1_occupancy
    to: "on"
    trigger: state
conditions:
  - condition: numeric_state
    entity_id: sensor.bewegungssensor1_illuminance
    below: 50
actions:
  # Turn on entrance lights with adaptive settings
  - service: light.turn_on
    target:
      area_id: entrance
    data:
      transition: 2
      brightness_pct: >
        {% set hour = now().hour %}
        {% if hour >= 22 or hour < 6 %}
          30
        {% elif hour >= 18 and hour < 22 %}
          70
        {% elif hour >= 6 and hour < 9 %}
          90
        {% else %}
          100
        {% endif %}
      kelvin: >
        {% set hour = now().hour %}
        {% if hour >= 22 or hour < 6 %}
          2700
        {% elif hour >= 18 and hour < 22 %}
          3000
        {% elif hour >= 17 and hour < 18 %}
          3500
        {% elif hour >= 9 and hour < 17 %}
          4000
        {% elif hour >= 6 and hour < 9 %}
          5000
        {% else %}
          4000
        {% endif %}
  # Wait for no motion
  - wait_for_trigger:
      - entity_id: binary_sensor.bewegungssensor1_occupancy
        to: "off"
        for:
          minutes: 2
        trigger: state
    continue_on_timeout: false
  # Check if adjacent rooms are occupied before turning off
  - condition: template
    value_template: >
      {{ not is_state('binary_sensor.praesenzsensor_presence', 'on') and
         not is_state('binary_sensor.praesenzsensor2_presence', 'on') }}
  # Turn off entrance lights
  - service: light.turn_off
    target:
      area_id: entrance
    data:
      transition: 2
mode: restart