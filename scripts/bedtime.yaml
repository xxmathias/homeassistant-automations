alias: Bedtime
description: "Turn off all lights except bedroom and prepare for sleep"
icon: mdi:sleep
sequence:
  - action: light.turn_off
    metadata: {}
    data:
      transition: 1
    target:
      area_id:
        - durchgangszimmer
        - entrance
        - kuche
        - wohnzimmer
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      area_id: wohnzimmer
  - action: light.turn_on
    metadata: {}
    data:
      transition: 1
    target:
      area_id: schlafzimmer
  - action: switch.turn_on
    metadata: {}
    data: {}
    target:
      area_id: schlafzimmer
mode: single