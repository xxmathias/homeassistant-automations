bedtime_mode:
  alias: Bedtime Mode
  description: Turn off all lights except bedroom and prepare for sleep
  sequence:
    - action: light.turn_off
      data:
        transition: 2
      target:
        area_id:
          - durchgangszimmer
          - entrance
          - kuche
          - wohnzimmer
    - action: switch.turn_off
      target:
        area_id: wohnzimmer
    - action: switch.turn_off
      target:
        entity_id:
          - switch.box_left
          - switch.box_right
    - action: light.turn_on
      data:
        transition: 2
      target:
        area_id: schlafzimmer
    - action: switch.turn_on
      target:
        area_id: schlafzimmer
  mode: single
