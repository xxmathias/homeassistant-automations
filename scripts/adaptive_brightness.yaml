alias: Adaptive Brightness
description: Returns appropriate brightness based on time of day and mode
mode: single
fields:
  mode:
    description: "Operating mode: normal, night, or bathroom"
    example: "normal"
    default: "normal"
    selector:
      select:
        options:
          - normal
          - night
          - bathroom
  room:
    description: "Room name for room-specific adjustments"
    example: "durchgangszimmer"
    default: ""
variables:
  hour: "{{ now().hour }}"
  is_night: "{{ hour >= 22 or hour < 6 }}"
  is_evening: "{{ hour >= 18 and hour < 22 }}"
  is_morning: "{{ hour >= 6 and hour < 9 }}"
  # Base brightness values
  brightness_normal: >
    {% if is_night %}
      30
    {% elif is_evening %}
      70
    {% elif is_morning %}
      90
    {% else %}
      100
    {% endif %}
  brightness_night: 20
  brightness_bathroom: 15
  # Room-specific adjustments
  room_multiplier: >
    {% if room == 'durchgangszimmer' %}
      0.8
    {% elif room == 'entrance' %}
      1.0
    {% elif room == 'kitchen' %}
      1.0
    {% elif room == 'bedroom' %}
      0.7
    {% else %}
      1.0
    {% endif %}
sequence:
  - stop: "Return brightness value"
    response_variable: brightness
    value: >
      {% if mode == 'night' %}
        {{ (brightness_night * room_multiplier) | int }}
      {% elif mode == 'bathroom' %}
        {{ brightness_bathroom }}
      {% else %}
        {{ (brightness_normal * room_multiplier) | int }}
      {% endif %}