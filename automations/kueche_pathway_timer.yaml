id: kitchen_pathway_timer
alias: Kitchen Pathway Light Timer
description: Turn off kitchen pathway light after 60 seconds
triggers:
  - entity_id: light.kuchenlampe
    to: "on"
    trigger: state
    id: light_on
  # Safety trigger - check every 5 minutes if light is stuck at pathway brightness
  - trigger: time_pattern
    minutes: "/5"
    id: safety_check
conditions:
  # Only act if light is on at 60% brightness (pathway lighting level)
  - condition: state
    entity_id: light.kuchenlampe
    state: "on"
  - condition: template
    value_template: >
      {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(255)|int %}
      {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
      {{ brightness_pct >= 58 and brightness_pct <= 62 }}
actions:
  - choose:
      # For safety check trigger, only proceed if light has been on for more than 2 minutes
      - conditions:
          - condition: trigger
            id: safety_check
          - condition: template
            value_template: >
              {% set last_changed = states.light.kuchenlampe.last_changed %}
              {{ (now() - last_changed).total_seconds() > 120 }}
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
        sequence:
          # Turn off immediately if stuck
          - service: light.turn_off
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
    # Default action for normal trigger
    default:
      # Wait 60 seconds
      - delay:
          seconds: 60
      # Check if still no presence in kitchen and still at pathway brightness
      - condition: state
        entity_id: binary_sensor.praesenzsensor_presence
        state: "off"
      - condition: template
        value_template: >
          {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(255)|int %}
          {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
          {{ brightness_pct >= 58 and brightness_pct <= 62 }}
      # Turn off kitchen light
      - service: light.turn_off
        target:
          entity_id: light.kuchenlampe
        data:
          transition: 2
mode: restart