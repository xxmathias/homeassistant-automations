id: kitchen_pathway_turnoff
alias: Kitchen Pathway Light Auto Turn-Off
description: Turn off kitchen light after 30 seconds if it was turned on as pathway light
triggers:
  - entity_id: light.kuchenlampe
    to: "on"
    trigger: state
conditions:
  # Only act if kitchen presence is not detected
  - condition: state
    entity_id: binary_sensor.praesenzsensor_presence
    state: "off"
  # Only act if brightness is 60% (pathway lighting level)
  - condition: template
    value_template: >
      {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(0)|int %}
      {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
      {{ brightness_pct == 60 }}
actions:
  # Wait 30 seconds
  - delay:
      seconds: 30
  # Check if still no presence
  - condition: state
    entity_id: binary_sensor.praesenzsensor_presence
    state: "off"
  # Turn off kitchen light
  - service: light.turn_off
    target:
      entity_id: light.kuchenlampe
    data:
      transition: 2
mode: restart