id: kitchen_on_presence
alias: Kitchen on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor_presence
    to: "on"
    id: an
    trigger: state
  - entity_id:
      - binary_sensor.praesenzsensor_presence
    to: "off"
    id: aus
    trigger: state
  # Also trigger when light turns on at pathway brightness while presence is already detected
  - entity_id: light.kuchenlampe
    to: "on"
    id: pathway_boost
    trigger: state
conditions:
  - condition: or
    conditions:
      # Skip illuminance check for pathway boost trigger
      - condition: trigger
        id: pathway_boost
      # Normal illuminance conditions for other triggers
      - condition: and
        conditions:
          - condition: not
            conditions:
              - condition: trigger
                id: pathway_boost
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: sensor.sun_solar_elevation
                below: 30
              - condition: template
                value_template: >
                  {% set illuminance = states('sensor.praesenzsensor_illuminance')|default('unknown') %}
                  {{ illuminance != 'unknown' and illuminance|float < 45 }}
  # Skip if in night pathway mode (night time + living room off) - except for pathway boost
  - condition: or
    conditions:
      # Allow pathway boost regardless of night mode
      - condition: trigger
        id: pathway_boost
      # Otherwise check if NOT in night mode
      - condition: or
        conditions:
          # Not night time hours
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
          # Or living room is on
          - condition: state
            entity_id: light.wohnzimmerlampe
            state: "on"
actions:
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: an
              # Boost from pathway to full brightness when presence is detected
              - condition: and
                conditions:
                  - condition: trigger
                    id: pathway_boost
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "on"
                  - condition: template
                    value_template: >
                      {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(255)|int %}
                      {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
                      {{ brightness_pct >= 58 and brightness_pct <= 62 }}
        sequence:
          # Turn on kitchen light with adaptive settings
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 100
              transition: 2
      - conditions:
          - condition: trigger
            id: aus
        sequence:
          # Wait 20 seconds before dimming
          - delay:
              seconds: 20
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Dim the light to 60%
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 60
              transition: 2
          # Wait another 20 seconds before turning off
          - delay:
              seconds: 20
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Turn off light completely
          - service: light.turn_off
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
mode: restart
