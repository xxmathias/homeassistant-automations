id: kitchen_on_presence
alias: Kitchen on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor_presence
    to: "on"
    id: an
    trigger: state
  - entity_id:
      - binary_sensor.praesenzsensor_presence
    to: "off"
    id: aus
    trigger: state
conditions:
  - condition: or
    conditions:
      - condition: numeric_state
        entity_id: sensor.sun_solar_elevation
        below: 30
      - condition: template
        value_template: >
          {% set illuminance = states('sensor.praesenzsensor_illuminance')|default('unknown') %}
          {{ illuminance != 'unknown' and illuminance|float < 45 }}
  # Don't trigger if light is at pathway brightness (60%) - let pathway timer handle it
  - condition: template
    value_template: >
      {% if trigger.id == 'an' %}
        {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(0)|int %}
        {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
        {{ brightness_pct < 58 or brightness_pct > 62 }}
      {% else %}
        true
      {% endif %}
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: an
        sequence:
          # Turn on kitchen light with adaptive settings
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 100
              kelvin: >
                {% set hour = now().hour %}
                {% if hour >= 22 or hour < 6 %}
                  2700
                {% elif hour >= 18 and hour < 22 %}
                  3000
                {% elif hour >= 17 and hour < 18 %}
                  3500
                {% elif hour >= 9 and hour < 17 %}
                  4000
                {% elif hour >= 6 and hour < 9 %}
                  5000
                {% else %}
                  4000
                {% endif %}
              transition: 2
      - conditions:
          - condition: trigger
            id: aus
        sequence:
          # Wait 90 seconds before dimming
          - delay:
              seconds: 90
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Dim the light when presence is lost
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 60
              transition: 2
          # Wait 30 more seconds (total 2:00 minutes)
          - delay:
              seconds: 30
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Turn off light completely
          - service: light.turn_off
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
mode: restart
