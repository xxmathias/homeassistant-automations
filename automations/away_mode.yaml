id: away_mode_turn_off_everything
alias: Away Mode - Turn Off Everything
description: Turn off all lights and switches when both people leave home
triggers:
  - entity_id: device_tracker.pixel_9_pro
    to: "not_home"
    trigger: state
  - entity_id: device_tracker.oddo
    to: "not_home"
    trigger: state
conditions:
  # Both people must be away
  - condition: and
    conditions:
      - condition: state
        entity_id: device_tracker.pixel_9_pro
        state: "not_home"
      - condition: state
        entity_id: device_tracker.oddo
        state: "not_home"
actions:
  # Turn off all lights
  - service: light.turn_off
    target:
      area_id:
        - schlafzimmer
        - durchgangszimmer
        - entrance
        - kuche
        - wohnzimmer
    data:
      transition: 2
  # Turn off all switches
  - service: switch.turn_off
    target:
      area_id:
        - schlafzimmer
        - durchgangszimmer
        - entrance
        - kuche
        - wohnzimmer
  # Send notification to Pixel 9 Pro
  - service: notify.mobile_app_pixel_9_pro
    data:
      title: "🏠 Away Mode Activated"
      message: "All lights and switches have been turned off automatically."
      data:
        notification_icon: "mdi:home-export-outline"
        color: "#2196F3"
mode: single
