# Eingang Motion Automation
#
# Sensors:
#   - binary_sensor.bewegungssensor2_licht_occupancy (motion detection)
#   - sensor.bewegungssensor1_illuminance (global light level)
#
# Note: Skips during night mode (23:00-07:00) - handled by night_pathway_mode
#
# Behavior:
#   Motion detected (illuminance < 150 lux):
#     - Turn on entrance lights at 100%
#     - Turn on durchgangszimmer as pathway at 60% (or keep current if higher)
#
#   Motion lost:
#     - Wait 3min → dim entrance to 50%
#     - Wait 30s → flash warning
#     - Wait 30s → turn off entrance
#     - Total: 4 min before off
#
id: entrance_on_motion
alias: Entrance on Motion
description: Motion-activated entrance lighting with adaptive brightness and color
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "off"
    trigger: state
    id: motion_off
conditions:
  # Skip during night mode (handled by night_pathway_mode automation)
  - condition: not
    conditions:
      - condition: time
        after: "23:00:00"
        before: "07:00:00"
  - condition: or
    conditions:
      - condition: trigger
        id: motion_on
      - condition: and
        conditions:
          - condition: trigger
            id: motion_off
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
          - condition: numeric_state
            entity_id: sensor.bewegungssensor1_illuminance
            below: 150
        sequence:
          # Turn on entrance lights with adaptive settings
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 3
              brightness_pct: 100
          # Turn on durchgangszimmer as pathway light
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
              brightness_pct: >
                {% if is_state('light.durchgangszimmer1', 'off') and
                is_state('light.durchgangszimmer2', 'off') %}
                  60
                {% else %}
                  {% set brightness1 = state_attr('light.durchgangszimmer1', 'brightness')|default(0)|int %}
                  {% set brightness2 = state_attr('light.durchgangszimmer2', 'brightness')|default(0)|int %}
                  {% set current_pct = [brightness1, brightness2]|max / 255 * 100|round(0) %}
                  {{ [current_pct, 60]|max }}
                {% endif %}
      - conditions:
          - condition: trigger
            id: motion_off
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          # Wait 4 minutes before dimming
          - delay:
              minutes: 4
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Dim to 50%
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              brightness_pct: 50
              transition: 3
          - delay:
              seconds: 10
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Flash warning
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              brightness_pct: 20
              transition: 1
          - delay:
              seconds: 1
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              brightness_pct: 50
              transition: 1
          - delay:
              seconds: 10
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              area_id: entrance
            data:
              transition: 3
mode: restart
