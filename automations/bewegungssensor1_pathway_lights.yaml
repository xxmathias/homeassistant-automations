id: bewegungssensor1_pathway_lights
alias: Bewegungssensor1 Pathway Lights
description: Turn on pathway lights when motion detected by bewegungssensor1
triggers:
  - entity_id: binary_sensor.bewegungssensor1_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor1_occupancy
    to: "off"
    trigger: state
    id: motion_off
conditions: []
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
          - condition: numeric_state
            entity_id: sensor.bewegungssensor1_illuminance
            below: 150
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
        sequence:
          # Turn on entrance at full brightness
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 3
              brightness_pct: 100
          # Turn on durchgangszimmer as pathway (preserve higher brightness if already on)
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
              brightness_pct: >
                {% if is_state('light.durchgangszimmer1', 'off') and
                is_state('light.durchgangszimmer2', 'off') %}
                  60
                {% else %}
                  {% set brightness1 = state_attr('light.durchgangszimmer1', 'brightness')|default(0)|int %}
                  {% set brightness2 = state_attr('light.durchgangszimmer2', 'brightness')|default(0)|int %}
                  {% set current_pct = [brightness1, brightness2]|max / 255 * 100|round(0) %}
                  {{ [current_pct, 60]|max }}
                {% endif %}
          # Turn on kitchen at 60% only if no presence detected
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
                      brightness_pct: 60
      - conditions:
          - condition: trigger
            id: motion_off
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          # Wait 60 seconds before turning off
          - delay:
              seconds: 60
          # Check if still no motion
          - condition: state
            entity_id: binary_sensor.bewegungssensor1_occupancy
            state: "off"
          # Turn off lights based on area presence
          - choose:
              # Turn off entrance and kitchen if no presence
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
          # Turn off durchgangszimmer only if no presence there
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "off"
                    for:
                      minutes: 5
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 3
                  - service: switch.turn_off
                    target:
                      entity_id: switch.afrika_stehlampe
          # Entrance lights are handled by eingang_on_motion (4min grace)
mode: restart
