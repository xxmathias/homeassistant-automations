id: bewegungssensor1_pathway_lights
alias: Bewegungssensor1 Pathway Lights
description: Turn on pathway lights when motion detected by bewegungssensor1
triggers:
  - entity_id: binary_sensor.bewegungssensor1_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor1_occupancy
    to: "off"
    trigger: state
    id: motion_off
conditions:
  - condition: numeric_state
    entity_id: sensor.bewegungssensor1_illuminance
    below: 50
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
        sequence:
          # Turn on entrance at full brightness
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 3
              brightness_pct: 100
          # Turn on durchgangszimmer at 60% only if currently off
          - choose:
              - conditions:
                  - condition: state
                    entity_id: light.durchgangszimmer1
                    state: "off"
                  - condition: state
                    entity_id: light.durchgangszimmer2
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 3
                      brightness_pct: 60
          # Turn on kitchen at 60% only if no presence detected
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
                      brightness_pct: 60
      - conditions:
          - condition: trigger
            id: motion_off
        sequence:
          # Wait 60 seconds before turning off
          - delay:
              seconds: 60
          # Check if still no motion
          - condition: state
            entity_id: binary_sensor.bewegungssensor1_occupancy
            state: "off"
          # Turn off lights based on area presence
          - choose:
              # Turn off entrance and kitchen if no presence
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
          # Turn off durchgangszimmer only if no presence there
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 3
          # Turn off entrance light only if no motion in entrance
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.bewegungssensor2_licht_occupancy
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      area_id: entrance
                    data:
                      transition: 3
mode: restart
