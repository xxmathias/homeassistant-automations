# Wohnzimmer Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor3_presence (presence detection)
#   - sensor.bewegungssensor2_licht_illuminance (light level check)
#
# Behavior:
#   Presence detected:
#     - Night (00:00-07:00 or night_mode on): Only wohnzimmerlampe at 10% warm
#     - Day (illuminance < 40 lux): All lights (desklamp, wohnzimmerlampe 100%, vintage+stehlampe 20%)
#
#   Presence lost:
#     - Night (00:00-07:00 or night_mode on): Turn off after 5s
#     - Day: Wait 5min → dim to 50% + turn off others → wait 30s → flash → wait 30s → off
#
id: wohnzimmer_on_presence
alias: Wohnzimmer on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "on"
    id: an
    trigger: state
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "off"
    id: aus
    trigger: state
conditions: []
actions:
  - choose:
      # Presence ON - night mode
      - conditions:
          - condition: trigger
            id: an
          - condition: or
            conditions:
              - condition: time
                after: "00:00:00"
                before: "07:00:00"
              - condition: state
                entity_id: input_boolean.night_mode
                state: "on"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 10
              kelvin: 2700
              transition: 3
      # Presence ON - day mode (only when dark)
      - conditions:
          - condition: trigger
            id: an
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 40
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.desklamp
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 100
              transition: 3
          - service: light.turn_on
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              brightness_pct: 20
              transition: 3
      # Presence OFF - night mode
      - conditions:
          - condition: trigger
            id: aus
          - condition: or
            conditions:
              - condition: time
                after: "00:00:00"
                before: "07:00:00"
              - condition: state
                entity_id: input_boolean.night_mode
                state: "on"
        sequence:
          - delay:
              seconds: 5
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 3
      # Presence OFF - day mode
      - conditions:
          - condition: trigger
            id: aus
        sequence:
          - delay:
              minutes: 5
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Dim main light, turn off others
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 3
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
          - service: light.turn_off
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 3
          - delay:
              seconds: 30
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Flash warning: pulse down and back up
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 20
              transition: 2
          - delay:
              seconds: 1
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 2
          - delay:
              seconds: 30
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 3
mode: restart
