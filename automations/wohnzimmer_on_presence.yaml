# Wohnzimmer Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor3_presence (presence detection)
#   - sensor.bewegungssensor2_licht_illuminance (global light level check)
#
# Behavior:
#   Presence detected:
#     - Night (23:00-07:00): Only wohnzimmerlampe at 10% warm
#     - Day (illuminance < 50 lux): All lights (desklamp, wohnzimmerlampe 100%, vintage+stehlampe 20%)
#
#   Presence lost:
#     - Night (23:00-07:00): Turn off after 2min (skip if extra lights manually on)
#     - Day: Wait 5min → dim to 50% + turn off others → wait 30s → flash → wait 30s → off
#
id: wohnzimmer_on_presence
alias: Wohnzimmer on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "on"
    id: an
    trigger: state
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "off"
    id: aus
    trigger: state
conditions: []
actions:
  - choose:
      # Presence ON - night mode
      - conditions:
          - condition: trigger
            id: an
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 20
              color_temp_kelvin: 2700
              transition: 3
      # Presence ON - day mode (only when dark)
      - conditions:
          - condition: trigger
            id: an
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 50
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 100
              transition: 3
          - service: light.turn_on
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              brightness_pct: 20
              transition: 3
          # Turn on desklamp if person stays for 45 seconds
          - delay:
              seconds: 45
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor3_presence
                    state: "on"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: switch.desklamp
      # Presence OFF - night mode
      # Skip turn-off if any extra light was manually turned on (treat as day mode)
      - conditions:
          - condition: trigger
            id: aus
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - delay:
              minutes: 2
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          - condition: template
            value_template: >
              {{ is_state('light.vintage_lampe', 'off')
                 and is_state('light.stehlampe', 'off')
                 and is_state('switch.desklamp', 'off') }}
          - service: light.turn_off
            target:
              entity_id:
                - light.wohnzimmerlampe
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 3
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
      # Presence OFF - day mode
      - conditions:
          - condition: trigger
            id: aus
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          - delay:
              minutes: 4
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off accent lights + desklamp immediately
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
          - service: light.turn_off
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 3
          # Dim main light to 50%
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 3
          - delay:
              seconds: 10
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Flash warning
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 20
              transition: 1
          - delay:
              seconds: 1
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 1
          - delay:
              seconds: 10
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 3
mode: restart
