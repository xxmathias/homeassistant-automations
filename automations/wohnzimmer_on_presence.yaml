# Wohnzimmer Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor3_presence (presence detection)
#   - sensor.bewegungssensor2_licht_illuminance (global light level check)
#
# Behavior:
#   Presence detected:
#     - Night (23:00-07:00): Only wohnzimmerlampe at 10% warm
#     - Day (illuminance < 30 lux): wohnzimmerlampe 100%, vintage+stehlampe 40%, desklamp on after 45s
#
#   Presence lost:
#     - Night (23:00-07:00): Turn off everything after 5min
#     - Day: Wait 10min → dim to 50% + turn off others → wait 30s → off
#
id: wohnzimmer_on_presence
alias: Wohnzimmer on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "on"
    id: an
    trigger: state
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "off"
    id: aus
    trigger: state
conditions: []
actions:
  - choose:
      # Presence ON - night mode
      - conditions:
          - condition: trigger
            id: an
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 20
              color_temp_kelvin: 2700
              transition: 3
      # Presence ON - day mode (only when dark or sun below horizon)
      - conditions:
          - condition: trigger
            id: an
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: sensor.bewegungssensor2_licht_illuminance
                below: 30
              - condition: numeric_state
                entity_id: sun.sun
                attribute: elevation
                below: 3
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 100
              transition: 3
          - service: light.turn_on
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              brightness_pct: 40
              transition: 3
          # Turn on desklamp if person stays for 45 seconds
          - delay:
              seconds: 45
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor3_presence
                    state: "on"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: switch.desklamp
      # Presence OFF - night mode
      - conditions:
          - condition: trigger
            id: aus
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - delay:
              minutes: 5
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          - service: light.turn_off
            target:
              entity_id:
                - light.wohnzimmerlampe
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 3
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
      # Presence OFF - day mode
      - conditions:
          - condition: trigger
            id: aus
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          - delay:
              minutes: 10
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off accent lights + desklamp immediately
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
          - service: light.turn_off
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 3
          # Skip dim warning if main light already off
          - condition: state
            entity_id: light.wohnzimmerlampe
            state: "on"
          # Dim main light to 50% as warning
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 3
          - delay:
              seconds: 30
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 3
mode: restart
