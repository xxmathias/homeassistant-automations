# Wohnzimmer Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor3_presence (presence detection)
#
# Behavior:
#   Night mode (23:00-07:00):
#     - Presence detected: Only wohnzimmerlampe at 10% warm (2700K)
#     - Presence lost: Turn off after 5s check
#
#   Day mode (07:00-23:00):
#     - Presence detected: All lights on (desklamp, wohnzimmerlampe 100%, vintage+stehlampe 20%)
#     - Presence lost: Dim to 50% after 3s check
#     - Presence detected while dimmed (45-55%): Boost back to 100%
#     - After 2 min at 50%: Flash warning (pulse to 15% and back)
#     - After 30s more: Turn off all lights
#
#   Manual override:
#     - If light is already on when presence detected, brightness is not changed
#     - This allows manual control without automation interference
#
id: wohnzimmer_on_presence
alias: Wohnzimmer on presence
description: Presence-activated living room lighting with immersive dimming
triggers:
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "on"
    id: presence_on
    trigger: state
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "off"
    id: presence_off
    trigger: state
  # Boost trigger: when light turns on at dimmed brightness while presence detected
  - entity_id: light.wohnzimmerlampe
    to: "on"
    id: brightness_boost
    trigger: state
conditions: []
actions:
  - choose:
      # Night mode: presence on - only wohnzimmerlampe at 10%
      - conditions:
          - condition: trigger
            id: presence_on
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
          - condition: state
            entity_id: light.wohnzimmerlampe
            state: "off"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 10
              kelvin: 2700
              transition: 1
      # Night mode: presence off - turn off immediately
      - conditions:
          - condition: trigger
            id: presence_off
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - delay:
              seconds: 5
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 2
      # Day mode: presence on - turn on all lights (only if off)
      - conditions:
          - condition: trigger
            id: presence_on
          - condition: state
            entity_id: light.wohnzimmerlampe
            state: "off"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.desklamp
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 100
              transition: 2
          - service: light.turn_on
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              brightness_pct: 20
              transition: 2
      # Day mode: boost back to 100% when presence detected at dimmed brightness
      - conditions:
          - condition: trigger
            id: brightness_boost
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "on"
          - condition: template
            value_template: >
              {% set brightness = state_attr('light.wohnzimmerlampe', 'brightness')|default(255)|int %}
              {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
              {{ brightness_pct >= 45 and brightness_pct <= 55 }}
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.desklamp
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 100
              transition: 1
          - service: light.turn_on
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              brightness_pct: 20
              transition: 1
      # Day mode: presence off - dim immediately, then turn off after timeout
      - conditions:
          - condition: trigger
            id: presence_off
        sequence:
          # Small delay to avoid flicker from momentary detection loss
          - delay:
              seconds: 3
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Dim wohnzimmerlampe to 50%, turn off others
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 2
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
          - service: light.turn_off
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 2
          # Wait before warning
          - delay:
              minutes: 2
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Flash warning: pulse down and back up
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 15
              transition: 1
          - delay:
              seconds: 1
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 1
          # Wait 30s after warning
          - delay:
              seconds: 30
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 2
mode: restart
