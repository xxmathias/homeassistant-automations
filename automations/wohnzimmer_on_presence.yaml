# Wohnzimmer Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor3_presence (presence detection)
#
# Behavior:
#   Presence detected:
#     - Night (23:00-07:00): Only wohnzimmerlampe at 10% warm
#     - Day: All lights (desklamp, wohnzimmerlampe 100%, vintage+stehlampe 20%)
#
#   Presence lost:
#     - Night: Turn off after 5s
#     - Day: Wait 5min → dim to 50% + turn off others → wait 2min → flash → wait 30s → off
#
id: wohnzimmer_on_presence
alias: Wohnzimmer on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "on"
    id: an
    trigger: state
  - entity_id: binary_sensor.praesenzsensor3_presence
    to: "off"
    id: aus
    trigger: state
conditions: []
actions:
  - choose:
      # Presence ON - night mode
      - conditions:
          - condition: trigger
            id: an
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 10
              kelvin: 2700
              transition: 2
      # Presence ON - day mode
      - conditions:
          - condition: trigger
            id: an
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.desklamp
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 100
              transition: 2
          - service: light.turn_on
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              brightness_pct: 20
              transition: 2
      # Presence OFF - night mode
      - conditions:
          - condition: trigger
            id: aus
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - delay:
              seconds: 5
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 2
      # Presence OFF - day mode
      - conditions:
          - condition: trigger
            id: aus
        sequence:
          - delay:
              minutes: 5
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Dim main light, turn off others
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 2
          - service: switch.turn_off
            target:
              entity_id: switch.desklamp
          - service: light.turn_off
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
            data:
              transition: 2
          - delay:
              minutes: 2
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Flash warning
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 15
              transition: 1
          - delay:
              seconds: 1
          - service: light.turn_on
            target:
              entity_id: light.wohnzimmerlampe
            data:
              brightness_pct: 50
              transition: 1
          - delay:
              seconds: 30
          - condition: state
            entity_id: binary_sensor.praesenzsensor3_presence
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id: light.wohnzimmerlampe
            data:
              transition: 2
mode: restart
