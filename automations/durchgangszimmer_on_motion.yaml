id: durchgangszimmer_on_motion
alias: Durchgangszimmer on Motion
description: Motion-activated durchgangszimmer lighting - 4min grace→dim 50%→flash→off (day only)
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion
  - entity_id: binary_sensor.praesenzsensor2_presence
    to: "on"
    trigger: state
    id: presence
  # Fires when BOTH sensors have been continuously off for 4 minutes,
  # so brief presence sensor dropouts don't trigger the shutdown sequence
  - trigger: template
    value_template: >-
      {{ is_state('binary_sensor.praesenzsensor2_presence', 'off')
         and is_state('binary_sensor.bewegungssensor2_licht_occupancy', 'off') }}
    for:
      minutes: 4
    id: absence
conditions:
  # Only require low light for motion trigger (presence/absence always works)
  - condition: or
    conditions:
      - condition: trigger
        id: presence
      - condition: trigger
        id: absence
      - condition: and
        conditions:
          - condition: trigger
            id: motion
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 50
actions:
  - choose:
      # Presence/motion detected - turn on lights (skip during night mode)
      - conditions:
          - condition: trigger
            id:
              - motion
              - presence
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
        sequence:
          # Turn on durchgangszimmer lights at full brightness
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
              brightness_pct: 100
          # Turn on kitchen as pathway light (only for motion trigger, non-blocking)
          - choose:
              - conditions:
                  - condition: trigger
                    id: motion
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
                      brightness_pct: 60
          # Turn on stehlampe if person stays for 90 seconds
          - delay:
              seconds: 90
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "on"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: switch.afrika_stehlampe
      # Both sensors off for 3+ minutes - shutdown sequence (skip at night)
      - conditions:
          - condition: trigger
            id: absence
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
        sequence:
          # Confirm both sensors still off
          - condition: state
            entity_id: binary_sensor.praesenzsensor2_presence
            state: "off"
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off stehlampe
          - service: switch.turn_off
            target:
              entity_id: switch.afrika_stehlampe
          # Dim to 50%
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              brightness_pct: 50
              transition: 3
          - delay:
              seconds: 20
          - condition: state
            entity_id: binary_sensor.praesenzsensor2_presence
            state: "off"
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
          # Turn off kitchen pathway light if no presence there
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
mode: restart
