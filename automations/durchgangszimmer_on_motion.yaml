alias: Durchgangszimmer on Motion
description: Motion-activated durchgangszimmer lighting with presence validation
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion
  - entity_id: binary_sensor.praesenzsensor2_presence
    to: "on"
    trigger: state
    id: presence
conditions:
  - condition: numeric_state
    entity_id: sensor.bewegungssensor2_licht_illuminance
    below: 50
actions:
  # Turn on durchgangszimmer lights with adaptive settings
  - service: light.turn_on
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      transition: 1
      brightness_pct: >
        {% set hour = now().hour %}
        {% set is_night_mode = hour >= 23 or hour < 7 %}
        {% set other_lights_off = is_state('light.wohnzimmerlampe', 'off') and is_state('light.kuchenlampe', 'off') %}
        {% set base_brightness = 100 %}
        {% if is_night_mode and other_lights_off %}
          {% set base_brightness = 20 %}
        {% elif is_night_mode %}
          {% set base_brightness = 30 %}
        {% endif %}
        {% set room_multiplier = 0.8 %}
        {% set target_brightness = (base_brightness * room_multiplier)|int %}
        {% set is_presence_trigger = trigger.id == 'presence' %}
        {% if is_state('light.durchgangszimmer1', 'on') or is_state('light.durchgangszimmer2', 'on') %}
          {% set current_brightness1 = state_attr('light.durchgangszimmer1', 'brightness')|default(0)|int %}
          {% set current_brightness2 = state_attr('light.durchgangszimmer2', 'brightness')|default(0)|int %}
          {% set current_pct = ([current_brightness1, current_brightness2]|max / 255 * 100)|round(0) %}
          {% if is_presence_trigger %}
            {% set boosted_brightness = (current_pct * 1.15)|round(0) %}
            {{ [boosted_brightness, 100]|min }}
          {% else %}
            {{ [current_pct, target_brightness]|max }}
          {% endif %}
        {% else %}
          {{ target_brightness }}
        {% endif %}
      kelvin: >
        {% set hour = now().hour %}
        {% if hour >= 22 or hour < 6 %}
          2700
        {% elif hour >= 18 and hour < 22 %}
          3000
        {% elif hour >= 17 and hour < 18 %}
          3500
        {% elif hour >= 9 and hour < 17 %}
          4000
        {% elif hour >= 6 and hour < 9 %}
          5000
        {% else %}
          4000
        {% endif %}
  # Turn on kitchen as pathway light
  - service: light.turn_on
    target:
      entity_id: light.kuchenlampe
    data:
      transition: 1
      brightness_pct: >
        {% if is_state('light.kuchenlampe', 'off') %}
          60
        {% else %}
          {% set current_brightness = state_attr('light.kuchenlampe', 'brightness')|default(0)|int %}
          {% set current_pct = current_brightness / 255 * 100|round(0) %}
          {{ [current_pct, 60]|max }}
        {% endif %}
      kelvin: >
        {% set hour = now().hour %}
        {% if hour >= 22 or hour < 6 %}
          2700
        {% else %}
          3000
        {% endif %}
  # Wait for presence to turn off
  - wait_for_trigger:
      - entity_id: binary_sensor.praesenzsensor2_presence
        to: "off"
        trigger: state
    continue_on_timeout: false
  # Immediately dim when presence is lost
  - service: light.turn_on
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      brightness_pct: 20
      transition: 1
  # Wait 10 seconds
  - delay:
      seconds: 10
  # Check if still no presence and no motion
  - condition: template
    value_template: >
      {{ is_state('binary_sensor.praesenzsensor2_presence', 'off') and
         is_state('binary_sensor.bewegungssensor2_licht_occupancy', 'off') }}
  # Turn off lights completely
  - service: light.turn_off
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      transition: 1
mode: restart