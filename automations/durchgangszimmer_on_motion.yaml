id: durchgangszimmer_on_motion
alias: Durchgangszimmer on Motion
description: Motion-activated durchgangszimmer lighting - 10min grace→off (day only)
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion
  - entity_id: binary_sensor.praesenzsensor2_presence
    to: "on"
    trigger: state
    id: presence
  # Fires when BOTH sensors have been continuously off for 10 minutes,
  # so brief presence sensor dropouts don't trigger the shutdown sequence
  - trigger: template
    value_template: >-
      {{ is_state('binary_sensor.praesenzsensor2_presence', 'off')
         and is_state('binary_sensor.bewegungssensor2_licht_occupancy', 'off') }}
    for:
      minutes: 10
    id: absence
conditions:
  # Only require low light for motion trigger (presence/absence always works)
  - condition: or
    conditions:
      # Presence: skip night (handled by night_pathway_mode)
      - condition: and
        conditions:
          - condition: trigger
            id: presence
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
      - condition: trigger
        id: absence
      - condition: and
        conditions:
          - condition: trigger
            id: motion
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: sensor.bewegungssensor2_licht_illuminance
                below: 50
              - condition: numeric_state
                entity_id: sun.sun
                attribute: elevation
                below: 3
          # Skip motion at night - handled by night_pathway_mode
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
actions:
  - choose:
      # Presence/motion detected - day mode (night handled by night_pathway_mode)
      - conditions:
          - condition: trigger
            id:
              - motion
              - presence
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
        sequence:
          # Turn on entrance at full brightness
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 3
              brightness_pct: 100
          # Turn on durchgangszimmer lights at full brightness
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
              brightness_pct: 100
          # Turn on kitchen as pathway light (only for motion trigger, non-blocking)
          - choose:
              - conditions:
                  - condition: trigger
                    id: motion
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
                      brightness_pct: 60
          # Turn on stehlampe if person stays for 45 seconds
          - delay:
              seconds: 45
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "on"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: switch.afrika_stehlampe
      # Both sensors off for 10+ minutes - shutdown sequence (skip at night)
      - conditions:
          - condition: trigger
            id: absence
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
          - condition: not
            conditions:
              - condition: time
                after: "23:00:00"
                before: "07:00:00"
        sequence:
          # Confirm both sensors still off
          - condition: state
            entity_id: binary_sensor.praesenzsensor2_presence
            state: "off"
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off stehlampe
          - service: switch.turn_off
            target:
              entity_id: switch.afrika_stehlampe
          # Turn off main lights directly (no dim warning - user prefers full brightness until off)
          - service: light.turn_off
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
          # Turn off kitchen only if at pathway brightness (≤62%), not if presence automation set it higher
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                  - condition: template
                    value_template: >
                      {% set b = state_attr('light.kuchenlampe', 'brightness')|int(0) %}
                      {{ (b / 255 * 100)|round(0) <= 62 }}
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
          # Turn off entrance if bewegungssensor1 is also off
          - condition: state
            entity_id: binary_sensor.bewegungssensor1_occupancy
            state: "off"
          - service: light.turn_off
            target:
              area_id: entrance
            data:
              transition: 3
mode: restart
