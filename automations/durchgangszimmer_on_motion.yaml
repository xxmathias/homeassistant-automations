id: durchgangszimmer_on_motion
alias: Durchgangszimmer on Motion
description: Motion-activated durchgangszimmer lighting with presence validation
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion
  - entity_id: binary_sensor.praesenzsensor2_presence
    to: "on"
    trigger: state
    id: presence
conditions:
  - condition: or
    conditions:
      - condition: and
        conditions:
          - condition: trigger
            id: motion
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 50
      - condition: and
        conditions:
          - condition: trigger
            id: presence
          - condition: state
            entity_id: light.durchgangszimmer1
            state: "on"
actions:
  # Turn on durchgangszimmer lights with adaptive settings
  - service: light.turn_on
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      transition: 2
      brightness_pct: 100
  # Turn on kitchen as pathway light (only for motion trigger, non-blocking)
  - choose:
      - conditions:
          - condition: trigger
            id: motion
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
              brightness_pct: 60
  # Wait for both presence and motion to be clear (max 2 minutes)
  - repeat:
      while:
        - condition: and
          conditions:
            - condition: template
              value_template: "{{ repeat.index <= 60 }}"
            - condition: or
              conditions:
                - condition: state
                  entity_id: binary_sensor.praesenzsensor2_presence
                  state: "on"
                - condition: state
                  entity_id: binary_sensor.bewegungssensor2_licht_occupancy
                  state: "on"
      sequence:
        - delay:
            seconds: 2
  # Kitchen pathway turn-off is now handled by separate timer automation
  # Wait 60 seconds after sensors clear before dimming
  - delay:
      seconds: 60
  # Only dim if still no presence (don't dim while someone is present!)
  - condition: state
    entity_id: binary_sensor.praesenzsensor2_presence
    state: "off"
  # Dim durchgangszimmer lights
  - service: light.turn_on
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      brightness_pct: 20
      transition: 2
  # Wait 30 seconds then turn off
  - delay:
      seconds: 30
  # Final turn-off with retry logic
  - repeat:
      count: 3
      sequence:
        - condition: template
          value_template: >
            {{ is_state('binary_sensor.praesenzsensor2_presence', 'off') and
               is_state('binary_sensor.bewegungssensor2_licht_occupancy', 'off') }}
        - service: light.turn_off
          target:
            entity_id:
              - light.durchgangszimmer1
              - light.durchgangszimmer2
              - light.stehlampe
          data:
            transition: 2
        - stop: "Lights turned off successfully"
        - delay:
            seconds: 2
mode: restart
