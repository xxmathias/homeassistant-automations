id: durchgangszimmer_on_motion
alias: Durchgangszimmer on Motion
description: Motion-activated durchgangszimmer lighting - stays on while presence detected
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion
  - entity_id: binary_sensor.praesenzsensor2_presence
    to: "on"
    trigger: state
    id: presence
conditions:
  # Only require low light for motion trigger (presence always works)
  - condition: or
    conditions:
      - condition: trigger
        id: presence
      - condition: and
        conditions:
          - condition: trigger
            id: motion
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 50
actions:
  # Turn on durchgangszimmer lights with adaptive settings
  - choose:
      # Night mode: use dimmed lighting
      - conditions:
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
          - condition: state
            entity_id: light.wohnzimmerlampe
            state: "off"
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 2
              brightness_pct: 20
              kelvin: 2700
      # Normal mode: full brightness
      - conditions: []
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 2
              brightness_pct: 100
  # Turn on kitchen as pathway light (only for motion trigger, non-blocking)
  - choose:
      - conditions:
          - condition: trigger
            id: motion
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
              brightness_pct: 60
  # Wait while presence OR motion is detected (check every 2 seconds, max 10 minutes)
  - repeat:
      while:
        - condition: template
          value_template: "{{ repeat.index <= 300 }}"
        - condition: or
          conditions:
            - condition: state
              entity_id: binary_sensor.praesenzsensor2_presence
              state: "on"
            - condition: state
              entity_id: binary_sensor.bewegungssensor2_licht_occupancy
              state: "on"
      sequence:
        - delay:
            seconds: 2
  # Both sensors are now off - wait 60 seconds before dimming
  - delay:
      seconds: 60
  # Check again - if presence returned, stop (automation will restart)
  - condition: state
    entity_id: binary_sensor.praesenzsensor2_presence
    state: "off"
  - condition: state
    entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    state: "off"
  # Dim durchgangszimmer lights
  - service: light.turn_on
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      brightness_pct: 20
      transition: 2
  # Wait 30 seconds then turn off
  - delay:
      seconds: 30
  # Final check before turning off
  - condition: state
    entity_id: binary_sensor.praesenzsensor2_presence
    state: "off"
  - condition: state
    entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    state: "off"
  # Turn off lights
  - service: light.turn_off
    target:
      entity_id:
        - light.durchgangszimmer1
        - light.durchgangszimmer2
    data:
      transition: 2
mode: restart
