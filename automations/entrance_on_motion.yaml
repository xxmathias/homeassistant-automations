id: entrance_on_motion
alias: Entrance on Motion
description: Motion-activated entrance lighting with adaptive brightness and color
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "off"
    trigger: state
    id: motion_off
conditions:
  - condition: or
    conditions:
      - condition: trigger
        id: motion_on
      - condition: and
        conditions:
          - condition: trigger
            id: motion_off
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 50
        sequence:
          # Turn on entrance lights with adaptive settings
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 2
              brightness_pct: 100
          # Turn on durchgangszimmer as pathway light
          - choose:
              # Night mode: use dimmed lighting
              - conditions:
                  - condition: time
                    after: "23:00:00"
                    before: "07:00:00"
                  - condition: state
                    entity_id: light.wohnzimmerlampe
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 2
                      brightness_pct: 20
                      kelvin: 2700
              # Normal mode: 60% pathway lighting
              - conditions: []
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 2
                      brightness_pct: >
                        {% if is_state('light.durchgangszimmer1', 'off') and
                        is_state('light.durchgangszimmer2', 'off') %}
                          60
                        {% else %}
                          {% set brightness1 = state_attr('light.durchgangszimmer1', 'brightness')|default(0)|int %}
                          {% set brightness2 = state_attr('light.durchgangszimmer2', 'brightness')|default(0)|int %}
                          {% set current_pct = [brightness1, brightness2]|max / 255 * 100|round(0) %}
                          {{ [current_pct, 60]|max }}
                        {% endif %}
      - conditions:
          - condition: trigger
            id: motion_off
        sequence:
          # Wait 1:30 (90 seconds) before dimming
          - delay:
              seconds: 90
          # Check if still no motion
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Dim the light
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              brightness_pct: 60
              transition: 2
          # Wait another 30 seconds (total 2:00 minutes)
          - delay:
              seconds: 30
          # Check if still no motion
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off entrance lights
          - service: light.turn_off
            target:
              area_id: entrance
            data:
              transition: 2
mode: restart
