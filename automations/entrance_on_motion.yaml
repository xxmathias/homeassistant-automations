id: entrance_on_motion
alias: Entrance on Motion
description: Motion-activated entrance lighting with adaptive brightness and color
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "off"
    trigger: state
    id: motion_off
conditions:
  - condition: or
    conditions:
      - condition: trigger
        id: motion_on
      - condition: and
        conditions:
          - condition: trigger
            id: motion_off
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 50
        sequence:
          # Turn on entrance lights with adaptive settings
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 2
              brightness_pct: >
                {% set hour = now().hour %}
                {% set is_night_mode = hour >= 23 or hour < 7 %}
                {% set base_brightness = 100 %}
                {% if is_night_mode %}
                  {% set base_brightness = 30 %}
                {% endif %}
                {% set room_multiplier = 0.8 if is_night_mode else 1.0 %}
                {{ (base_brightness * room_multiplier)|int }}
              kelvin: >
                {% set hour = now().hour %}
                {% if hour >= 22 or hour < 6 %}
                  2700
                {% elif hour >= 18 and hour < 22 %}
                  3000
                {% elif hour >= 17 and hour < 18 %}
                  3500
                {% elif hour >= 9 and hour < 17 %}
                  4000
                {% elif hour >= 6 and hour < 9 %}
                  5000
                {% else %}
                  4000
                {% endif %}
          # Turn on durchgangszimmer as pathway light
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 1
              brightness_pct: >
                {% if is_state('light.durchgangszimmer1', 'off') and
                is_state('light.durchgangszimmer2', 'off') %}
                  60
                {% else %}
                  {% set brightness1 = state_attr('light.durchgangszimmer1', 'brightness')|default(0)|int %}
                  {% set brightness2 = state_attr('light.durchgangszimmer2', 'brightness')|default(0)|int %}
                  {% set current_pct = [brightness1, brightness2]|max / 255 * 100|round(0) %}
                  {{ [current_pct, 60]|max }}
                {% endif %}
              kelvin: >
                {% set hour = now().hour %}
                {% if hour >= 22 or hour < 6 %}
                  2700
                {% else %}
                  3000
                {% endif %}
      - conditions:
          - condition: trigger
            id: motion_off
        sequence:
          # Wait 2:30 (150 seconds) before dimming
          - delay:
              seconds: 150
          # Check if still no motion
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Dim the light
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              brightness_pct: 30
              transition: 2
          # Wait another 30 seconds (total 3:00 minutes)
          - delay:
              seconds: 30
          # Check if still no motion
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off entrance lights
          - service: light.turn_off
            target:
              area_id: entrance
            data:
              transition: 2
mode: restart