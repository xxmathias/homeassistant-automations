# Kueche Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor_presence (presence detection)
#
# Behavior:
#   Presence detected:
#     - Turn on at 100%
#     - Boost from 60% pathway to 100% if presence detected
#
#   Presence lost:
#     - Wait 60s → dim to 50%
#     - Wait 30s → flash warning (pulse to 20% and back)
#     - Wait 30s → turn off
#
id: kitchen_on_presence
alias: Kitchen on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor_presence
    to: "on"
    id: an
    trigger: state
  - entity_id:
      - binary_sensor.praesenzsensor_presence
    to: "off"
    id: aus
    trigger: state
  # Also trigger when light turns on at pathway brightness while presence is already detected
  - entity_id: light.kuchenlampe
    to: "on"
    id: pathway_boost
    trigger: state
conditions:
  - condition: or
    conditions:
      # Skip illuminance check for pathway boost trigger
      - condition: trigger
        id: pathway_boost
      # Allow presence trigger when light is already on at pathway brightness (boost needed)
      - condition: and
        conditions:
          - condition: trigger
            id: an
          - condition: state
            entity_id: light.kuchenlampe
            state: "on"
          - condition: template
            value_template: >
              {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(255)|int %}
              {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
              {{ brightness_pct >= 58 and brightness_pct <= 62 }}
      # Normal illuminance conditions for other triggers
      - condition: and
        conditions:
          - condition: not
            conditions:
              - condition: trigger
                id: pathway_boost
          - condition: numeric_state
            entity_id: sensor.sun_solar_elevation
            below: 30
actions:
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: an
              # Boost from pathway to full brightness when presence is detected
              - condition: and
                conditions:
                  - condition: trigger
                    id: pathway_boost
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "on"
                  - condition: template
                    value_template: >
                      {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(255)|int %}
                      {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
                      {{ brightness_pct >= 58 and brightness_pct <= 62 }}
        sequence:
          # Turn on kitchen light with adaptive settings
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 100
              transition: 2
      - conditions:
          - condition: trigger
            id: aus
        sequence:
          # Wait 60 seconds before dimming
          - delay:
              seconds: 60
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Dim the light to 50%
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 50
              transition: 2
          # Wait before warning
          - delay:
              seconds: 30
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Flash warning: pulse down and back up
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 20
              transition: 1
          - delay:
              seconds: 1
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 50
              transition: 1
          # Wait 30s after warning
          - delay:
              seconds: 30
          # Check if still no presence
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Turn off light completely
          - service: light.turn_off
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
mode: restart
