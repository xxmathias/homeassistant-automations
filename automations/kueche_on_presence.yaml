# Kueche Presence Automation
#
# Sensors:
#   - binary_sensor.praesenzsensor_presence (presence detection)
#   - sensor.bewegungssensor2_licht_illuminance (global light level check)
#
# Behavior:
#   Presence detected:
#     - Turn on at 100% (when illuminance < 30 lux or sun elevation < 3°, or light at pathway brightness)
#     - Boost from 60% pathway to 100% when presence turns on
#
#   Presence lost:
#     - Night (23:00-07:00): 2min grace → off
#     - Day: 4min grace → dim to 50% → off
#
id: kitchen_on_presence
alias: Kitchen on presence
triggers:
  - entity_id: binary_sensor.praesenzsensor_presence
    to: "on"
    id: an
    trigger: state
  - entity_id:
      - binary_sensor.praesenzsensor_presence
    to: "off"
    for:
      minutes: 2
    id: aus
    trigger: state
conditions:
  - condition: or
    conditions:
      # Always allow off trigger through (lights must turn off regardless of sun)
      - condition: trigger
        id: aus
      # Allow presence trigger when light is already on at pathway brightness (boost needed)
      - condition: and
        conditions:
          - condition: trigger
            id: an
          - condition: state
            entity_id: light.kuchenlampe
            state: "on"
          - condition: template
            value_template: >
              {% set brightness = state_attr('light.kuchenlampe', 'brightness')|default(255)|int %}
              {% set brightness_pct = (brightness / 255 * 100)|round(0) %}
              {{ brightness_pct >= 58 and brightness_pct <= 62 }}
      # Normal: turn on when dark (matches wohnzimmer/durchgangszimmer/entrance logic)
      - condition: and
        conditions:
          - condition: trigger
            id: an
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: sensor.bewegungssensor2_licht_illuminance
                below: 30
              - condition: numeric_state
                entity_id: sun.sun
                attribute: elevation
                below: 3
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: an
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              brightness_pct: 100
              transition: 3
      - conditions:
          - condition: trigger
            id: aus
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          # Sensor has been off for 2+ minutes (handled by trigger `for`)
          # Confirm still off, then start shutdown
          - condition: state
            entity_id: binary_sensor.praesenzsensor_presence
            state: "off"
          # Skip shutdown if light already off
          - condition: state
            entity_id: light.kuchenlampe
            state: "on"
          # Night: just turn off. Day: extra delay + dim→off.
          - choose:
              - conditions:
                  - condition: time
                    after: "23:00:00"
                    before: "07:00:00"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
            default:
              - delay:
                  minutes: 2
              - condition: state
                entity_id: binary_sensor.praesenzsensor_presence
                state: "off"
              # Dim to 50%
              - service: light.turn_on
                target:
                  entity_id: light.kuchenlampe
                data:
                  brightness_pct: 50
                  transition: 3
              - delay:
                  seconds: 10
              - condition: state
                entity_id: binary_sensor.praesenzsensor_presence
                state: "off"
              # Turn off
              - service: light.turn_off
                target:
                  entity_id: light.kuchenlampe
                data:
                  transition: 3
mode: restart
