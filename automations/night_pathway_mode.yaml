id: night_pathway_mode
alias: Night Pathway Mode
description: Minimal pathway lighting when living room is off and motion detected at entrance
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "off"
    trigger: state
    id: motion_off
conditions:
  # Night time hours (11 PM - 7 AM)
  - condition: time
    after: "23:00:00"
    before: "07:00:00"
  # Living room light is off (indicates night/sleep time)
  - condition: state
    entity_id: light.wohnzimmerlampe
    state: "off"
  # Low light conditions
  - condition: numeric_state
    entity_id: sensor.bewegungssensor2_licht_illuminance
    below: 50
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
        sequence:
          # Turn on entrance at 70%
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 2
              brightness_pct: 70
              kelvin: 2700 # Warm light for night
          # Turn on durchgangszimmer at 20%
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 2
              brightness_pct: 20
              kelvin: 2700
          # Turn on kitchen at 20%
          - service: light.turn_on
            target:
              entity_id: light.kuchenlampe
            data:
              transition: 2
              brightness_pct: 20
              kelvin: 2700
      - conditions:
          - condition: trigger
            id: motion_off
        sequence:
          # Wait 3 minutes before turning off
          - delay:
              minutes: 3
          # Check if still no motion in entrance
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off entrance
          - service: light.turn_off
            target:
              area_id: entrance
            data:
              transition: 2
          # Turn off durchgangszimmer if no presence
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 2
          # Turn off kitchen if no presence
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 2
mode: restart
