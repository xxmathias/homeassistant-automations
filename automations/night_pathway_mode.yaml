id: night_pathway_mode
alias: Night Pathway Mode
description: Minimal pathway lighting when living room is off and motion detected at entrance
triggers:
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "on"
    trigger: state
    id: motion_on
  - entity_id: binary_sensor.bewegungssensor2_licht_occupancy
    to: "off"
    trigger: state
    id: motion_off
  # Turn off durchgangszimmer lights + stehlampe when presence clears
  - entity_id: binary_sensor.praesenzsensor2_presence
    to: "off"
    for:
      minutes: 2
    trigger: state
    id: presence_off
conditions:
  # Night mode: 23:00-07:00
  - condition: time
    after: "23:00:00"
    before: "07:00:00"
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
        sequence:
          # Turn on entrance at 70%
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              transition: 3
              brightness_pct: 40
              kelvin: 2700 # Warm light for night
          # Turn on durchgangszimmer at 20% only if no presence
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 3
                      brightness_pct: 30
                      kelvin: 2700
          # Turn on stehlampe if person stays in durchgangszimmer for 30 seconds
          - delay:
              seconds: 30
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "on"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: switch.afrika_stehlampe
          # Turn on kitchen at 30% only if no presence
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
                      brightness_pct: 30
                      kelvin: 2700
      - conditions:
          - condition: trigger
            id: motion_off
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          # Wait 2 minutes before turning off
          - delay:
              minutes: 2
          # Check if still no motion in entrance
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Dim entrance to 20%
          - service: light.turn_on
            target:
              area_id: entrance
            data:
              brightness_pct: 20
              transition: 3
          # Dim durchgangszimmer + turn off stehlampe if no presence
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "off"
                    for:
                      minutes: 2
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      brightness_pct: 15
                      transition: 3
                  - service: switch.turn_off
                    target:
                      entity_id: switch.afrika_stehlampe
          - delay:
              seconds: 10
          - condition: state
            entity_id: binary_sensor.bewegungssensor2_licht_occupancy
            state: "off"
          # Turn off entrance
          - service: light.turn_off
            target:
              area_id: entrance
            data:
              transition: 3
          # Turn off durchgangszimmer if no presence
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor2_presence
                    state: "off"
                    for:
                      minutes: 2
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id:
                        - light.durchgangszimmer1
                        - light.durchgangszimmer2
                    data:
                      transition: 3
          # Turn off kitchen if no presence (5min debounce)
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.praesenzsensor_presence
                    state: "off"
                    for:
                      minutes: 2
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: light.kuchenlampe
                    data:
                      transition: 3
      # Durchgangszimmer presence off for 2+ minutes - dim→off
      - conditions:
          - condition: trigger
            id: presence_off
          - condition: state
            entity_id: input_boolean.keep_lights_on
            state: "off"
        sequence:
          - condition: state
            entity_id: binary_sensor.praesenzsensor2_presence
            state: "off"
          # Dim + turn off stehlampe
          - service: light.turn_on
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              brightness_pct: 15
              transition: 3
          - service: switch.turn_off
            target:
              entity_id: switch.afrika_stehlampe
          - delay:
              seconds: 10
          - condition: state
            entity_id: binary_sensor.praesenzsensor2_presence
            state: "off"
          # Turn off
          - service: light.turn_off
            target:
              entity_id:
                - light.durchgangszimmer1
                - light.durchgangszimmer2
            data:
              transition: 3
mode: restart
