# Wohnzimmer Motion Automation (from Durchgangszimmer)
#
# Sensors:
#   - binary_sensor.bewegungssensor1_occupancy (motion in durchgangszimmer)
#   - sensor.bewegungssensor2_licht_illuminance (light level)
#
# Behavior:
#   Night mode (23:00-07:00):
#     - Only wohnzimmerlampe at 10% warm
#
#   Day mode (07:00-22:00):
#     - Very dark (< 10 lux): desklamp + all wohnzimmer lights
#     - Slightly dark (10-20 lux): only desklamp
#
alias: Wohnzimmer on motion
description: Motion-activated lighting from bewegungssensor1
triggers:
  - trigger: state
    entity_id: binary_sensor.bewegungssensor1_occupancy
    to: "on"
conditions:
  - condition: numeric_state
    entity_id: sensor.bewegungssensor2_licht_illuminance
    below: 20
actions:
  - choose:
      # Night mode: only wohnzimmerlampe at 10%
      - conditions:
          - condition: time
            after: "23:00:00"
            before: "07:00:00"
        sequence:
          - action: light.turn_on
            data:
              transition: 2
              brightness_pct: 10
              kelvin: 2700
            target:
              entity_id: light.wohnzimmerlampe
      # Daytime very dark (< 10 lux): full setup
      - conditions:
          - condition: time
            after: "07:00:00"
            before: "22:00:00"
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            below: 10
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.desklamp
          - action: light.turn_on
            data:
              transition: 2
            target:
              area_id: wohnzimmer
          - action: light.turn_on
            data:
              transition: 2
              brightness_pct: 100
            target:
              entity_id: light.wohnzimmerlampe
          - action: light.turn_on
            data:
              transition: 2
              brightness_pct: 20
            target:
              entity_id:
                - light.vintage_lampe
                - light.stehlampe
      # Daytime slightly dark (10-20 lux): only desklamp
      - conditions:
          - condition: time
            after: "07:00:00"
            before: "22:00:00"
          - condition: numeric_state
            entity_id: sensor.bewegungssensor2_licht_illuminance
            above: 10
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.desklamp
mode: restart
