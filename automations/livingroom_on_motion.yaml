alias: livingroom_on_motion
description: Motion-activated lighting with adaptive brightness and color
triggers:
  - type: occupied
    device_id: b1b329d4ce5d2ab76da71acd1fc3c4a2
    entity_id: edba6ca93c009b956f6a4c0576bb40cf
    domain: binary_sensor
    trigger: device
conditions:
  - condition: numeric_state
    entity_id: sensor.sun_solar_elevation
    below: 30
  - condition: state
    entity_id: light.wohnzimmerlampe
    state: "off"
  - condition: time
    after: "10:00:00"
    before: "23:00:00"
actions:
  # Turn on living room lights with adaptive settings
  - service: light.turn_on
    target:
      area_id: wohnzimmer
    data:
      transition: 1
      brightness_pct: >
        {% set hour = now().hour %}
        {% if hour >= 23 or hour < 7 %}
          30
        {% else %}
          100
        {% endif %}
      kelvin: >
        {% set hour = now().hour %}
        {% if hour >= 22 or hour < 6 %}
          2700
        {% elif hour >= 18 and hour < 22 %}
          3000
        {% elif hour >= 17 and hour < 18 %}
          3500
        {% elif hour >= 9 and hour < 17 %}
          4000
        {% elif hour >= 6 and hour < 9 %}
          5000
        {% else %}
          4000
        {% endif %}
mode: restart
