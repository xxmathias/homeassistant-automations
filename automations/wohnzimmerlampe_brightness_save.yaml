# Wohnzimmerlampe Brightness Save
#
# Saves the wohnzimmerlampe brightness to input_number whenever it changes
# while the user is present. This excludes shutdown dimming (which only
# happens after presence goes off).
#
# Requires: input_number.wohnzimmerlampe_brightness helper (default 100, min 1, max 100)
#
id: wohnzimmerlampe_brightness_save
alias: Save Wohnzimmerlampe Brightness
description: Track brightness changes to wohnzimmerlampe while user is present
triggers:
  - entity_id: light.wohnzimmerlampe
    trigger: state
    attribute: brightness
conditions:
  # Only save when user is present (excludes shutdown dimming)
  - condition: state
    entity_id: binary_sensor.praesenzsensor3_presence
    state: "on"
  # Only when light is on
  - condition: state
    entity_id: light.wohnzimmerlampe
    state: "on"
  # Only during day mode (night mode uses fixed 20%)
  - condition: not
    conditions:
      - condition: time
        after: "23:00:00"
        before: "07:00:00"
actions:
  - service: input_number.set_value
    target:
      entity_id: input_number.wohnzimmerlampe_brightness
    data:
      value: >
        {{ (state_attr('light.wohnzimmerlampe', 'brightness') | int / 255 * 100) | round(0) }}
mode: single
