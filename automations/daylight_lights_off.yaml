# Daylight Lights Off
#
# When natural daylight is sufficient (>40 lux for 5 minutes),
# turn off all lights to save energy.
#
id: daylight_lights_off
alias: Daylight Lights Off
description: Turn off all lights when bright for 5 minutes
triggers:
  - entity_id: sensor.bewegungssensor2_licht_illuminance
    above: 40
    for:
      minutes: 5
    trigger: numeric_state
conditions:
  - condition: state
    entity_id: input_boolean.keep_lights_on
    state: "off"
actions:
  - service: script.turn_on
    target:
      entity_id: script.turn_off_all
mode: single
